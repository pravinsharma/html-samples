<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Button – Sharp Square</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0f0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .bg { position: fixed; inset: 0; background: radial-gradient(circle at 65% 35%, rgba(16, 185, 129, 0.20) 0%, transparent 55%), linear-gradient(180deg, #0a0f0d 0%, #0d1a14 100%); z-index: -1; }
        button {
            position: relative;
            padding: 16px 44px;
            font-size: 15px;
            font-weight: 600;
            color: #d1fae5;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            background: rgba(16, 185, 129, 0.07);
            border: 1px solid rgba(52, 211, 153, 0.18);
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 6px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(52, 211, 153, 0.08);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            outline: none;
        }
        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(52, 211, 153, 0.12) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: inherit;
        }
        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent);
            transition: left 0.5s ease;
        }
        button:hover { background: rgba(16, 185, 129, 0.13); border-color: rgba(52, 211, 153, 0.32); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.42), 0 0 18px rgba(52, 211, 153, 0.08), inset 0 1px 0 rgba(52, 211, 153, 0.14); transform: translateY(-2px); }
        button:hover::before { opacity: 1; }
        button:hover::after { left: 100%; }
        button:active { transform: translateY(0) scale(0.97); box-shadow: 0 3px 14px rgba(0, 0, 0, 0.30), inset 0 2px 6px rgba(0, 0, 0, 0.2); }
        button span { position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <button><span>Confirm</span></button>
</body>
</html>
