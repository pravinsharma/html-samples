<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassy Form Elements</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }
        .bg-orb:nth-child(1) { width: 520px; height: 520px; top: -120px; left: -120px; background: radial-gradient(circle, #4f46e577, transparent 70%); }
        .bg-orb:nth-child(2) { width: 420px; height: 420px; bottom: -80px; right: -80px; background: radial-gradient(circle, #10b98177, transparent 70%); }
        .bg-orb:nth-child(3) { width: 320px; height: 320px; top: 50%; left: 60%; background: radial-gradient(circle, #f59e0b55, transparent 70%); }

        .glass-form {
            position: relative;
            z-index: 1;
            width: 420px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow:
                0 25px 50px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-header h2 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            letter-spacing: -0.01em;
        }
        .form-header p {
            color: rgba(255,255,255,0.45);
            font-size: 0.88rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.65);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .glass-input {
            width: 100%;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.28); }
        .glass-input:focus {
            background: rgba(255,255,255,0.08);
            border-color: rgba(99,102,241,0.55);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.12), inset 0 2px 6px rgba(0,0,0,0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .glass-select {
            width: 100%;
            padding: 14px 18px;
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }
        .glass-select:focus {
            border-color: rgba(99,102,241,0.55);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
        }
        .glass-select option {
            background: #1e1e2e;
            color: white;
        }

        .glass-textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
        }
        .glass-textarea::placeholder { color: rgba(255,255,255,0.28); }
        .glass-textarea:focus {
            background: rgba(255,255,255,0.08);
            border-color: rgba(99,102,241,0.55);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .glass-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 7px;
            background: rgba(255,255,255,0.06);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .glass-checkbox:checked {
            background: rgba(99,102,241,0.4);
            border-color: rgba(99,102,241,0.7);
        }
        .glass-checkbox:checked::after {
            content: '\2713';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 13px;
            font-weight: 700;
        }
        .checkbox-group label {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .glass-btn-submit {
            flex: 1;
            padding: 15px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(99,102,241,0.45), rgba(139,92,246,0.35));
            border: 1px solid rgba(99,102,241,0.5);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.35s ease;
            box-shadow: 0 4px 24px rgba(99,102,241,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
        }
        .glass-btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(99,102,241,0.38), inset 0 1px 0 rgba(255,255,255,0.18);
            border-color: rgba(99,102,241,0.75);
        }

        .glass-btn-cancel {
            flex: 1;
            padding: 15px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .glass-btn-cancel:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.22);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <div class="glass-form">
        <div class="form-header">
            <h2>Sign Up</h2>
            <p>Create your account to get started</p>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="glass-input" placeholder="John Doe">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="glass-input" placeholder="john@example.com">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Country</label>
                <select class="glass-select">
                    <option value="" disabled selected>Select...</option>
                    <option>United States</option>
                    <option>Canada</option>
                    <option>United Kingdom</option>
                </select>
            </div>
            <div class="form-group">
                <label>Plan</label>
                <select class="glass-select">
                    <option value="" disabled selected>Choose...</option>
                    <option>Free</option>
                    <option>Pro</option>
                    <option>Enterprise</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" class="glass-input" placeholder="Min. 8 characters">
        </div>

        <div class="form-group">
            <label>About You</label>
            <textarea class="glass-textarea" placeholder="Tell us a little about yourself..."></textarea>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" class="glass-checkbox" id="terms">
            <label for="terms">I agree to the Terms &amp; Conditions</label>
        </div>

        <div class="btn-group">
            <button class="glass-btn-submit">Create Account</button>
            <button class="glass-btn-cancel">Cancel</button>
        </div>
    </div>

</body>
</html>
