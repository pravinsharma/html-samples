<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassy Search & Bar Forms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            padding: 2rem;
            background: #0b0b10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }
        .bg-orb:nth-child(1) { width: 480px; height: 480px; top: -100px; left: 20%; background: radial-gradient(circle, #6366f177, transparent 70%); }
        .bg-orb:nth-child(2) { width: 420px; height: 420px; bottom: -60px; right: 10%; background: radial-gradient(circle, #14b8a677, transparent 70%); }
        .bg-orb:nth-child(3) { width: 280px; height: 280px; top: 45%; left: 10%; background: radial-gradient(circle, #f9731655, transparent 70%); }

        .input-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }

        .card-title {
            color: rgba(255,255,255,0.55);
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        /* ── Glassy Search Bar ── */
        .glass-search {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0 1.25rem;
            height: 56px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.06);
            transition: all 0.3s ease;
        }
        .glass-search:focus-within {
            border-color: rgba(99,102,241,0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 4px rgba(99,102,241,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .search-icon {
            color: rgba(255,255,255,0.35);
            font-size: 18px;
            flex-shrink: 0;
        }
        .glass-search input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .glass-search input::placeholder { color: rgba(255,255,255,0.28); }
        .search-shortcut {
            font-size: 0.73rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.4);
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* ── Glassy Registration Bar (2 fields + button) ── */
        .glass-reg-bar {
            display: flex;
            align-items: stretch;
            gap: 0;
            width: 100%;
            height: 58px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .reg-input {
            flex: 1;
            padding: 0 1.25rem;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        .reg-input::placeholder { color: rgba(255,255,255,0.28); }
        .reg-btn {
            padding: 0 1.75rem;
            border: none;
            background: linear-gradient(135deg, rgba(124,58,237,0.45), rgba(14,165,233,0.35));
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .reg-btn:hover {
            background: linear-gradient(135deg, rgba(124,58,237,0.6), rgba(14,165,233,0.5));
        }

        /* ── Glassy Combined Input+Button ── */
        .glass-combined {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.5rem;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .combined-input {
            flex: 1;
            padding: 0 1rem;
            height: 46px;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 0.92rem;
            font-family: inherit;
        }
        .combined-input::placeholder { color: rgba(255,255,255,0.28); }
        .combined-option {
            padding: 0 0.9rem;
            height: 46px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }
        .combined-option:hover { background: rgba(255,255,255,0.12); color: white; }
        .combined-submit {
            height: 46px;
            padding: 0 1.4rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(16,185,129,0.45), rgba(6,182,212,0.35));
            border: 1px solid rgba(16,185,129,0.4);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        .combined-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(16,185,129,0.3);
        }

        /* ── Glassy Button Row ── */
        .glass-actions {
            display: flex;
            gap: 1rem;
            width: 100%;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .action-save {
            background: rgba(99,102,241,0.22);
            border: 1px solid rgba(99,102,241,0.42);
            color: white;
            box-shadow: 0 4px 20px rgba(99,102,241,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .action-save:hover {
            background: rgba(99,102,241,0.32);
            border-color: rgba(99,102,241,0.65);
            transform: translateY(-2px);
        }
        .action-discard {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }
        .action-discard:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.22);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <div class="input-card">
        <div class="card-title">Search Bar</div>
        <div class="glass-search">
            <span class="search-icon">&#128269;</span>
            <input type="text" placeholder="Search anything...">
            <span class="search-shortcut">&#8984; K</span>
        </div>
    </div>

    <div class="input-card">
        <div class="card-title">Newsletter Input Bar</div>
        <div class="glass-reg-bar">
            <input type="text" class="reg-input" placeholder="Your name">
            <input type="email" class="reg-input" placeholder="you@email.com">
            <button class="reg-btn">Subscribe</button>
        </div>
    </div>

    <div class="input-card">
        <div class="card-title">URL Shortener</div>
        <div class="glass-combined">
            <input type="url" class="combined-input" placeholder="Paste a long URL to shorten...">
            <select class="combined-option">
                <option>.link</option>
                <option>.url</option>
                <option>.go</option>
            </select>
            <button class="combined-submit">Shorten</button>
        </div>
    </div>

    <div class="input-card">
        <div class="card-title">Form Actions</div>
        <div class="glass-actions">
            <button class="action-btn action-save">Save Changes</button>
            <button class="action-btn action-discard">Discard</button>
        </div>
    </div>

</body>
</html>
