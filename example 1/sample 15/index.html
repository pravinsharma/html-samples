<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassy Login Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }
        .bg-orb:nth-child(1) { width: 600px; height: 600px; top: -150px; right: -100px; background: radial-gradient(circle, #7c3aed77, transparent 70%); }
        .bg-orb:nth-child(2) { width: 500px; height: 500px; bottom: -100px; left: -100px; background: radial-gradient(circle, #0ea5e977, transparent 70%); }
        .bg-orb:nth-child(3) { width: 300px; height: 300px; top: 50%; left: 30%; background: radial-gradient(circle, #f43f5e55, transparent 70%); }

        .glass-card {
            position: relative;
            z-index: 1;
            width: 380px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow:
                0 30px 60px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -1px 0 rgba(255,255,255,0.02);
        }

        .card-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .card-logo .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(124,58,237,0.35), rgba(14,165,233,0.25));
            border: 1px solid rgba(124,58,237,0.4);
            font-size: 24px;
            margin-bottom: 1rem;
        }
        .card-logo h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .card-logo p {
            color: rgba(255,255,255,0.4);
            font-size: 0.82rem;
            margin-top: 0.3rem;
        }

        .form-group {
            margin-bottom: 1.1rem;
            position: relative;
        }
        .glass-input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.28); }
        .glass-input:focus {
            background: rgba(255,255,255,0.08);
            border-color: rgba(124,58,237,0.55);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.12);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.32);
            font-size: 16px;
            pointer-events: none;
        }

        .forgot-pass {
            text-align: right;
            margin-bottom: 1.4rem;
        }
        .forgot-pass a {
            color: rgba(139,92,246,0.8);
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .forgot-pass a:hover { color: rgba(139,92,246,1); }

        .btn-login {
            width: 100%;
            padding: 15px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(124,58,237,0.5), rgba(14,165,233,0.4));
            border: 1px solid rgba(124,58,237,0.5);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.35s ease;
            box-shadow: 0 6px 28px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.14);
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(124,58,237,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
            border-color: rgba(124,58,237,0.75);
        }

        /* Social Buttons */
        .social-label {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.78rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .social-label::before, .social-label::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 2.5rem);
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .social-label::before { left: 0; }
        .social-label::after { right: 0; }

        .social-btns {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .btn-social {
            flex: 1;
            padding: 11px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-social:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.22);
            transform: translateY(-2px);
        }

        .signup-link {
            text-align: center;
            font-size: 0.88rem;
            color: rgba(255,255,255,0.4);
        }
        .signup-link a {
            color: rgba(139,92,246,0.9);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .signup-link a:hover { color: rgba(139,92,246,1); }
    </style>
</head>
<body>

    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <div class="glass-card">
        <div class="card-logo">
            <div class="logo-icon">&#9919;</div>
            <h1>Welcome back</h1>
            <p>Sign in to continue</p>
        </div>

        <div class="form-group">
            <span class="input-icon">&#9993;</span>
            <input type="email" class="glass-input" placeholder="Email address">
        </div>

        <div class="form-group">
            <span class="input-icon">&#128274;</span>
            <input type="password" class="glass-input" placeholder="Password">
        </div>

        <div class="forgot-pass">
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn-login">Sign In</button>

        <p class="social-label">or continue with</p>

        <div class="social-btns">
            <button class="btn-social" title="Google">G</button>
            <button class="btn-social" title="GitHub">&#128187;</button>
            <button class="btn-social" title="Twitter">&#120143;</button>
        </div>

        <p class="signup-link">
            Don't have an account? <a href="#">Sign Up</a>
        </p>
    </div>

</body>
</html>
