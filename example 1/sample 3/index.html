<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassy Button</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0f10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(108, 99, 255, 0.25) 0%, transparent 55%),
                        radial-gradient(circle at 80% 50%, rgba(139, 92, 246, 0.18) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(79, 70, 229, 0.15) 0%, transparent 60%),
                        linear-gradient(180deg, #0f0f10 0%, #1a1a2e 100%);
            z-index: -1;
        }

        button {
            position: relative;
            padding: 14px 44px;
            font-size: 16px;
            font-weight: 600;
            color: #f4f3ff;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: rgba(120, 110, 255, 0.08);
            border: 1px solid rgba(180, 170, 255, 0.18);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.10),
                inset 0 -1px 0 rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(140, 130, 255, 0.05);
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            outline: none;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.08),
                transparent
            );
            transition: left 0.55s ease;
        }

        button::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 3px;
            right: 3px;
            height: 38%;
            border-radius: 50px 50px 200px 200px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.07) 0%,
                transparent 100%
            );
            pointer-events: none;
        }

        button:hover {
            background: rgba(130, 120, 255, 0.14);
            border-color: rgba(190, 180, 255, 0.30);
            box-shadow:
                0 14px 44px rgba(0, 0, 0, 0.40),
                0 0 20px rgba(140, 130, 255, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.14),
                inset 0 -1px 0 rgba(0, 0, 0, 0.12),
                0 0 0 1px rgba(160, 150, 255, 0.10);
            transform: translateY(-3px);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow:
                0 6px 20px rgba(0, 0, 0, 0.30),
                inset 0 2px 6px rgba(0, 0, 0, 0.15),
                inset 0 -1px 0 rgba(255, 255, 255, 0.06);
        }

        button span {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <button><span>Glassy</span></button>
</body>
</html>
