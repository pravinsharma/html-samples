<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost White Glass Newsletter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="sky-bg">
        <div class="sun"></div>
    </div>

    <main class="container">
        <div class="frost-card">
            <div class="card-content">
                <div class="icon-box">
                    <i data-lucide="sparkles"></i>
                </div>
                <h2>Weekly Insights</h2>
                <p>Join 25,000+ creators receiving our hand-picked design inspiration every Monday.</p>
                
                <form class="subscribe-form">
                    <div class="input-field">
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="glow-btn">
                        <span>Subscribe</span>
                        <i data-lucide="send"></i>
                    </button>
                </form>

                <p class="privacy-note">No spam, just quality. Unsubscribe anytime.</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
