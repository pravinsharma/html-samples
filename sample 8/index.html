<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Button – Floating Aurora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0812;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .bg {
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.28) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.20) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(236, 72, 153, 0.14) 0%, transparent 55%),
                linear-gradient(180deg, #0a0812 0%, #0f0a1e 100%);
        }
        .aurora {
            position: fixed;
            width: 600px; height: 400px;
            border-radius: 50%;
            background: conic-gradient(from 180deg, rgba(139, 92, 246, 0.15), rgba(59, 130, 246, 0.10), rgba(236, 72, 153, 0.12), rgba(139, 92, 246, 0.15));
            filter: blur(80px);
            animation: drift 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes drift {
            0% { top: 10%; left: 20%; }
            100% { top: 30%; left: 50%; }
        }
        button {
            position: relative;
            padding: 18px 56px;
            font-size: 16px;
            font-weight: 600;
            color: #e0d8ff;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: rgba(139, 92, 246, 0.07);
            border: 1px solid rgba(167, 139, 250, 0.20);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.40),
                0 0 60px rgba(139, 92, 246, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 -1px 0 rgba(0, 0, 0, 0.14);
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            outline: none;
        }
        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(167, 139, 250, 0.14) 50%, transparent 100%);
            transition: left 0.7s ease;
        }
        button::after {
            content: '';
            position: absolute;
            top: 2px; left: 3px; right: 3px; height: 42%;
            border-radius: 50px 50px 200px 200px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.09) 0%, transparent 100%);
            pointer-events: none;
        }
        button:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(167, 139, 250, 0.34);
            box-shadow:
                0 16px 50px rgba(0, 0, 0, 0.50),
                0 0 80px rgba(139, 92, 246, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                inset 0 -2px 0 rgba(0, 0, 0, 0.10);
            transform: translateY(-4px);
        }
        button:hover::before { left: 100%; }
        button:active { transform: translateY(-1px) scale(0.98); box-shadow: 0 6px 24px rgba(0, 0, 0, 0.40), inset 0 2px 6px rgba(0, 0, 0, 0.15); }
        button span { position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="aurora"></div>
    <button><span>Discover</span></button>
</body>
</html>
