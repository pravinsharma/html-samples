<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neomorphic Glass Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <div class="icon">✨</div>
        </div>
        <h2>Premium Design</h2>
        <p>Experience the future of UI with our glassy neomorphic components. Smooth, tactile, and visually stunning.</p>
        <div class="stats">
            <div class="stat">
                <span class="value">99%</span>
                <span class="label">Style</span>
            </div>
            <div class="stat">
                <span class="value">100%</span>
                <span class="label">Smooth</span>
            </div>
        </div>
        <button class="action-btn">Get Started</button>
    </div>
</body>
</html>
