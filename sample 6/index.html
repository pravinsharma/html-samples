<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Button – Large CTA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0c1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .bg {
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle at 25% 25%, rgba(244, 114, 182, 0.22) 0%, transparent 52%),
                radial-gradient(circle at 75% 70%, rgba(99, 102, 241, 0.20) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.12) 0%, transparent 60%),
                linear-gradient(180deg, #0f0c1a 0%, #1a0f2e 100%);
        }
        button {
            position: relative;
            padding: 22px 68px;
            font-size: 20px;
            font-weight: 700;
            color: #faf5ff;
            letter-spacing: 0.05em;
            text-transform: none;
            background: rgba(244, 114, 182, 0.09);
            border: 1px solid rgba(244, 114, 182, 0.22);
            border-radius: 18px;
            cursor: pointer;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.10),
                inset 0 -2px 0 rgba(0, 0, 0, 0.18),
                0 0 0 1px rgba(236, 72, 153, 0.06);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            outline: none;
        }
        button::before {
            content: '';
            position: absolute;
            top: 2px; left: 3px; right: 3px; height: 50%;
            border-radius: 15px 15px 200px 200px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.10) 0%, transparent 100%);
            pointer-events: none;
        }
        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.10), transparent);
            transition: left 0.6s ease;
        }
        button:hover {
            background: rgba(244, 114, 182, 0.16);
            border-color: rgba(244, 114, 182, 0.38);
            box-shadow:
                0 18px 56px rgba(0, 0, 0, 0.50),
                0 0 28px rgba(236, 72, 153, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                inset 0 -2px 0 rgba(0, 0, 0, 0.12),
                0 0 0 1px rgba(236, 72, 153, 0.10);
            transform: translateY(-4px);
        }
        button:hover::after { left: 100%; }
        button:active { transform: translateY(-1px) scale(0.98); box-shadow: 0 6px 24px rgba(0, 0, 0, 0.40), inset 0 3px 8px rgba(0, 0, 0, 0.18); }
        button span { position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <button><span>Get Started</span></button>
</body>
</html>
