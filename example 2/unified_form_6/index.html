<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neomorphic Blue Suite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="neomorph-shell">
        <header>
            <h1>Blue Protocol</h1>
            <p>Neomorphic Plastic Interface</p>
        </header>

        <form class="unified-form">
            <div class="control-group">
                <label>Access Key</label>
                <input type="text" placeholder="SEC-0042-ALPHA">
            </div>

            <div class="control-group inline">
                <label>System Active</label>
                <label class="neo-switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-group">
                <label>Load Balance</label>
                <input type="range" class="neo-range">
            </div>

            <div class="control-group">
                <label>Deployment Sector</label>
                <div class="radio-group">
                    <label class="neo-radio">
                        <input type="radio" name="sector" checked>
                        <span class="checkmark"></span>
                        North
                    </label>
                    <label class="neo-radio">
                        <input type="radio" name="sector">
                        <span class="checkmark"></span>
                        South
                    </label>
                </div>
            </div>

            <button type="submit" class="neo-btn">Activate System</button>
        </form>
    </div>
</body>
</html>
